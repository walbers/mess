name: Build and create release

on:
  release:
    types:
      - created

jobs:
  publish-mess:
    name: Build and publish mess
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - unknown-linux-gnu
          # - apple-darwin
        architecture:
          - x86_64
          - aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal
          target: ${{ matrix.architecture }}-${{ matrix.os }}
      - name: Install Dependencies
        if: matrix.architecture == 'aarch64' && matrix.os == 'unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu openssl libssl-dev
          sudo apt-get install -y libssl-dev:aarch64 || true
      - name: Build
        uses: actions-rs/cargo@v1
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: "/usr/lib/aarch64-linux-gnu/pkgconfig"
          OPENSSL_DIR: "/usr/aarch64-linux-gnu"
        with:
          command: build
          args: --release --target ${{ matrix.architecture }}-${{ matrix.os }}
      - name: Package
        run: |
          mkdir -p output/${{ matrix.architecture }}-${{ matrix.os }}
          cp target/${{ matrix.architecture }}-${{ matrix.os }}/release/mess output/${{ matrix.architecture }}-${{ matrix.os }}
          tar czf output/mess-${{ matrix.architecture }}-${{ matrix.os }}-${{ github.ref_name }}.tar.gz -C output/${{ matrix.architecture }}-${{ matrix.os }} mess
      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./output/mess-${{ matrix.architecture }}-${{ matrix.os }}-${{ github.ref_name }}.tar.gz
          asset_name: mess-${{ matrix.architecture }}-${{ matrix.os }}-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

